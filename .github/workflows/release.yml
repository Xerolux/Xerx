name: Create Theme Release ZIP

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build Installable Theme ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Theme Folder
        run: |
          # Create a temporary directory named after the theme
          mkdir xerx

          # Copy all files to the temporary directory, excluding development and hidden files
          rsync -av --progress ./ xerx/ --exclude xerx --exclude .git --exclude .github --exclude jest.config.js --exclude README.md

          # Create the zip file containing the theme folder
          zip -r xerx.zip xerx/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: xerx.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Theme Artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: xerx-theme
          path: xerx.zip
          retention-days: 7
